<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>多儿出警｜你是哪种开口困难户？</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --green: #58CC02; --green-dark: #46A302; --green-light: #89E219;
    --bg: #F0F5F0; --card: #FFFFFF; --text: #3C3C3C; --text-light: #777;
    --orange: #FF9600; --red: #FF4B4B; --blue: #1CB0F6;
    --radius: 16px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden;
  }
  .duo-wrap { display: flex; align-items: center; justify-content: center; }
  .duo-wrap svg { max-width: 100%; height: auto; display: block; }

  /* ===== START ===== */
  #screen-start {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 32px 24px; text-align: center;
    background: linear-gradient(180deg, #58CC02 0%, #46A302 100%);
  }
  #screen-start .duo-start { animation: float 2s ease-in-out infinite; width: 200px; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  #screen-start h1 { font-size: 30px; font-weight: 800; color: #fff; margin: 8px 0 4px; text-shadow: 0 2px 4px rgba(0,0,0,0.15); }
  #screen-start .subtitle { font-size: 16px; color: rgba(255,255,255,0.9); margin-bottom: 28px; }
  #screen-start .badge-row { display: flex; gap: 12px; margin-bottom: 24px; }
  #screen-start .badge { background: rgba(255,255,255,0.2); color: #fff; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(4px); }
  .btn-start {
    background: #fff; color: var(--green-dark); border: none; padding: 16px 56px;
    border-radius: 50px; font-size: 20px; font-weight: 800; cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.15); transition: all 0.15s; touch-action: manipulation;
    font-family: inherit;
  }
  .btn-start:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.15); }

  /* ===== QUIZ ===== */
  #screen-quiz { display: none; min-height: 100vh; padding: 20px 16px 100px; }
  .progress-bar { display: flex; gap: 6px; margin-bottom: 16px; padding: 0 4px; }
  .progress-dot { flex:1; height:6px; border-radius:3px; background:#E0E6E0; transition:background 0.3s; }
  .progress-dot.active { background: var(--green); }
  .progress-dot.done { background: var(--green-light); }
  .duo-status {
    display: flex; align-items: center; gap: 14px; margin-bottom: 16px;
    background: var(--card); border-radius: var(--radius); padding: 12px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .duo-status .duo-wrap { flex-shrink: 0; width: 60px; }
  .duo-status .duo-speech { font-size: 14px; line-height: 1.5; color: var(--text-light); }
  .duo-status .duo-speech strong { color: var(--text); }
  .question-card {
    background: var(--card); border-radius: var(--radius); padding: 24px 20px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 12px;
  }
  .q-icon { width: 32px; height: 32px; margin-bottom: 8px; }
  .question-num { font-size: 12px; font-weight: 600; color: var(--green); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .question-text { font-size: 19px; font-weight: 700; line-height: 1.4; margin-bottom: 18px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex; align-items: center; gap: 12px; width:100%; text-align:left;
    padding: 13px 16px; border: 2px solid #E8E8E8; border-radius: 12px;
    background: #FAFAFA; font-size: 15px; line-height: 1.4; color: var(--text);
    cursor: pointer; transition: all 0.15s; touch-action: manipulation; font-family: inherit;
  }
  .option-btn:active { transform: scale(0.98); }
  .option-btn .opt-icon { font-size: 18px; flex-shrink: 0; }
  .option-btn .opt-tag {
    display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 8px;
    border-radius: 10px; margin-left: auto; flex-shrink: 0;
  }
  .option-btn .opt-tag.tag-worst { background:#FFE0E0; color:#CC0000; }
  .option-btn .opt-tag.tag-bad { background:#FFF0D0; color:#CC8800; }
  .option-btn .opt-tag.tag-ok { background:#E0F0FF; color:#0066CC; }
  .option-btn .opt-tag.tag-best { background:#D0FFD0; color:#008800; }
  .option-btn:hover { border-color: #D0D0D0; }
  .option-btn.selected { border-color: var(--green); background: #EFFFDB; }
  .btn-next-wrap {
    position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 16px 24px;
    background: linear-gradient(180deg, transparent 0%, var(--bg) 30%); z-index: 10;
  }
  .btn-next {
    width: 100%; padding: 16px; border: none; border-radius: 14px;
    font-size: 18px; font-weight: 700; cursor: pointer; transition: all 0.15s;
    touch-action: manipulation; font-family: inherit;
    background: #D0D0D0; color: #999;
  }
  .btn-next.active { background: var(--green); color: #fff; box-shadow: 0 4px 0 var(--green-dark); }
  .btn-next.active:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--green-dark); }

  /* ===== RESULT ===== */
  #screen-result { display: none; min-height: 100vh; padding: 32px 20px 40px; text-align: center; }
  .result-header { margin-bottom: 20px; }
  .result-duo { width: 140px; margin: 0 auto; animation: float 2s ease-in-out infinite; }
  .result-type-badge {
    display: inline-block; padding: 5px 18px; border-radius: 20px;
    font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 6px;
  }
  .result-title { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
  .result-subtitle { font-size: 15px; color: var(--text-light); margin-bottom: 16px; line-height: 1.5; }
  .result-detail {
    background: var(--card); border-radius: var(--radius); padding: 20px 18px; margin-bottom: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: left;
  }
  .result-detail .dr-section { margin-bottom: 16px; }
  .result-detail .dr-section:last-child { margin-bottom: 0; }
  .result-detail .dr-label {
    display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 12px;
    border-radius: 10px; margin-bottom: 8px; letter-spacing: 0.5px;
  }
  .result-detail ul { list-style: none; padding: 0; }
  .result-detail li {
    padding: 6px 0; font-size: 14px; line-height: 1.5; border-bottom: 1px solid #F3F3F3;
    padding-left: 20px; position: relative;
  }
  .result-detail li:last-child { border-bottom: none; }
  .result-detail .duo-quote {
    background: #F8FFF0; border-left: 3px solid var(--green); padding: 10px 14px;
    border-radius: 0 10px 10px 0; margin: 10px 0; font-size: 13px; line-height: 1.6; color: #555;
  }
  .result-detail .duo-quote::before { content: "多儿说："; font-weight: 700; color: var(--green-dark); display: block; margin-bottom: 4px; }
  .danger-stars { margin: 10px 0; }
  .star-filled { color: #FFC800; font-size: 20px; letter-spacing: 2px; }
  .star-empty { color: #E0E0E0; font-size: 20px; letter-spacing: 2px; }
  .danger-labels { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .danger-labels span { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 8px; }
  .share-text-box {
    background: #FFF8E0; border: 1px dashed #FFB800; border-radius: 12px;
    padding: 14px 16px; margin-bottom: 14px; font-size: 13px; line-height: 1.6; text-align: left;
  }
  .share-text-box .label { font-weight: 700; color: #B8860B; font-size: 12px; display: block; margin-bottom: 6px; }
  .share-text-box .share-url { display: block; word-break: break-all; font-size: 11px; color: #999; margin-top: 6px; background: #FFFDF0; padding: 6px 8px; border-radius: 6px; }
  .btn-copy {
    background: var(--orange); color: #fff; border: none; padding: 8px 20px;
    border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 8px; touch-action: manipulation;
  }
  .btn-group { display: flex; flex-direction: column; gap: 10px; }
  .btn-retake {
    background: var(--card); color: var(--green-dark); border: 2px solid var(--green);
    padding: 14px; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer;
    touch-action: manipulation; font-family: inherit;
  }
  .btn-retake:active { background: #EFFFDB; }
  .result-footer { margin-top: 24px; font-size: 12px; color: #BBB; }

  /* ===== MISSION ===== */
  #screen-mission { display: none; min-height: 100vh; padding: 32px 20px 40px; text-align: center; }
  #screen-mission h2 { font-size: 22px; font-weight: 800; margin: 8px 0 4px; }
  #screen-mission .subtitle { font-size: 14px; color: var(--text-light); margin-bottom: 20px; }
  .mission-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 18px; }
  .mission-card {
    background: var(--card); border-radius: var(--radius); padding: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06); text-align: left;
    border: 2px solid transparent; cursor: pointer; transition: all 0.15s;
  }
  .mission-card:active { border-color: var(--green); background: #EFFFDB; }
  .mission-card .mc-icon { font-size: 26px; margin-bottom: 2px; }
  .mission-card .mc-title { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
  .mission-card .mc-desc { font-size: 13px; color: var(--text-light); margin-bottom: 6px; }
  .mission-card .mc-phrases { font-size: 12px; color: var(--green-dark); background: #EFFFDB; padding: 6px 10px; border-radius: 8px; display: inline-block; }
  .btn-mission {
    width: 100%; padding: 16px; border: none; border-radius: 14px;
    background: var(--green); color: #fff; font-size: 18px; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 0 var(--green-dark);
    font-family: inherit; touch-action: manipulation;
  }
  .btn-mission:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--green-dark); }

  /* ===== CONFETTI ===== */
  .confetti-container { position: fixed; top:0;left:0;right:0;bottom:0; pointer-events:none; overflow:hidden; z-index:100; }
  .confetti { position:absolute; width:10px;height:10px; border-radius:2px; animation:confetti-fall linear forwards; }
  @keyframes confetti-fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
  .fade-in { animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .slide-in { animation: slideIn 0.3s ease-out; }
  @keyframes slideIn { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
  @media (max-width:380px) { #screen-start h1{font-size:24px} .question-text{font-size:17px} }
</style>
</head>
<body>

<script>
// ============================================================
// 多儿（Duo）SVG — 基于官方多儿参考图的精确二创
// viewBox="0 0 170 163"  #58CC02 绿  #89E219 浅绿  #F49000 橙
// 特征：3簇头羽、盾形白脸、3粒绿腹斑、大眼暗瞳孔
// ============================================================

// 基础多儿模板
function duoSVG(wingsOverlay, eyesOverlay, beakStyle, extras) {
  const W = wingsOverlay || '';
  const E = eyesOverlay || '';
  const B = beakStyle || '';
  const X = extras || '';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 163" width="100%" height="100%">
  <defs>
    <clipPath id="bodyClip"><path d="M52 2C68 9 79 12 85 12 91 12 102 9 117 2 128-2 140 3 144 13 145 16 146 18 146 21v63c0 34-27 61-61 61-34 0-61-27-61-61V21C24 10 33 0 45 0c2 0 5 1 7 2z"/></clipPath>
  </defs>
  <!-- 阴影 -->
  <ellipse cx="85" cy="158" rx="46" ry="5" fill="rgba(0,0,0,0.10)"/>
  <!-- 左脚 -->
  <rect x="55" y="137" width="26" height="16" rx="5" fill="#F49000"/>
  <!-- 右脚 -->
  <rect x="89" y="137" width="26" height="16" rx="5" fill="#F49000"/>
  <!-- 翅膀-左 -->
  <path d="M3 112L42 36C44 32 49 30 53 33 68 49 72 73 62 95 52 117 30 129 9 125 5 124 2 118 3 112Z" fill="#58CC02"/>
  <!-- 翅膀-右 -->
  <path d="M167 112L128 36C126 32 121 30 117 33 102 49 98 73 108 95 118 117 140 129 161 125 165 124 168 118 167 112Z" fill="#58CC02"/>
  <!-- 身体主体 -->
  <path d="M52 2C68 9 79 12 85 12 91 12 102 9 117 2 128-2 140 3 144 13 145 16 146 18 146 21v63c0 34-27 61-61 61-34 0-61-27-61-61V21C24 10 33 0 45 0c2 0 5 1 7 2z" fill="#58CC02"/>
  <!-- 身体内侧高光 -->
  <path d="M40 15c8-4 18-6 26-6h38c8 0 18 2 26 6 0 0-6 48-45 48-39 0-45-48-45-48z" fill="#6EDA0A" opacity="0.08"/>
  <!-- 3簇头羽 -->
  <path d="M56 12L75 33C76 34 76 36 74 37 67 40 60 37 55 32 50 27 50 19 53 13 54 12 55 11 56 12Z" fill="#89E219"/>
  <path d="M73 29C79 35 89 36 96 30 103 24 96 65 96 64 96 64 93 64 86 64 84 64 80 64 74 64 69 38 68 26 73 29Z" fill="#89E219"/>
  <path d="M114 12L106 33C105 34 105 36 107 37 113 40 120 37 125 32 130 27 131 19 127 13 127 12 125 11 114 12Z" fill="#89E219"/>
  <!-- 翅膀覆盖层 -->
  ${W}
  <!-- 白色脸部（盾形） -->
  <ellipse cx="58" cy="52" rx="20" ry="24" fill="white"/>
  <ellipse cx="112" cy="52" rx="20" ry="24" fill="white"/>
  <rect x="58" y="28" width="54" height="48" fill="white"/>
  <!-- 白色下巴区域 -->
  <ellipse cx="85" cy="72" rx="28" ry="16" fill="white"/>
  <!-- 3粒腹斑 (绿色椭圆) -->
  <ellipse cx="74" cy="82" rx="3.5" ry="2.5" fill="#58CC02" opacity="0.15"/>
  <ellipse cx="96" cy="82" rx="3.5" ry="2.5" fill="#58CC02" opacity="0.15"/>
  <ellipse cx="85" cy="90" rx="3.5" ry="2.5" fill="#58CC02" opacity="0.15"/>
  <!-- 眼睛-左 -->
  <ellipse cx="58" cy="50" rx="12" ry="13" fill="white" stroke="#E0E0E0" stroke-width="0.3"/>
  <!-- 眼睛-右 -->
  <ellipse cx="112" cy="50" rx="12" ry="13" fill="white" stroke="#E0E0E0" stroke-width="0.3"/>
  <!-- 瞳孔-左 -->
  <ellipse cx="60" cy="51" rx="7" ry="8.5" fill="#2A2A2A"/>
  <ellipse cx="62" cy="48" rx="2.5" ry="3" fill="white" opacity="0.7"/>
  <!-- 瞳孔-右 -->
  <ellipse cx="110" cy="51" rx="7" ry="8.5" fill="#2A2A2A"/>
  <ellipse cx="112" cy="48" rx="2.5" ry="3" fill="white" opacity="0.7"/>
  <!-- 喙 -->
  <path d="M82 63 Q85 72 88 63 Q85 60 82 63Z" fill="#F49000"/>
  <!-- 嘴巴线 -->
  <path d="M78 76 C80 80 90 80 92 76" stroke="#89E219" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- 脸颊红晕 -->
  <ellipse cx="44" cy="62" rx="5" ry="3" fill="#FFB5B5" opacity="0.35"/>
  <ellipse cx="126" cy="62" rx="5" ry="3" fill="#FFB5B5" opacity="0.35"/>
  <!-- 动态覆盖层 -->
  ${E}${B}${X}
</svg>`;
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
}

// ===== 8种表情 =====
const DUO = {};

// 1. 开心庆祝 (Happy) - 首页
DUO.happy = duoSVG(
  // 翅膀高举
  `<path d="M-3 80Q-25 30-15 10Q-5-10 8 45Z" fill="#58CC02"/>
   <path d="M173 80Q195 30 185 10Q175-10 162 45Z" fill="#58CC02"/>`,
  // 笑眼
  `<path d="M50 46Q58 38 66 46" stroke="#2A2A2A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
   <path d="M104 46Q112 38 120 46" stroke="#2A2A2A" stroke-width="2.5" fill="none" stroke-linecap="round"/>`,
  // 张嘴笑
  `<path d="M82 63 Q85 72 88 63 Q85 60 82 63Z" fill="#F49000"/>
   <path d="M80 68 Q85 74 90 68" fill="#FF6B6B" opacity="0.4"/>`,
  `<text x="18" y="22" font-size="10">✨</text>
   <text x="148" y="22" font-size="10">✨</text>
   <polygon points="38,8 40,3 42,8 47,8 43,12 44,17 40,13 36,17 37,12 33,8" fill="#FFD700"/>
   <polygon points="132,8 134,3 136,8 141,8 137,12 138,17 134,13 130,17 131,12 127,8" fill="#FFD700"/>`
);

// 2. 害羞爱心 (Love) - 温柔型结果
DUO.love = duoSVG(
  // 翅膀捂脸羞
  `<path d="M20 45Q12 38 15 30Q18 24 25 40Z" fill="#58CC02"/>
   <path d="M150 45Q158 38 155 30Q152 24 145 40Z" fill="#58CC02"/>`,
  // 闭眼笑
  `<path d="M50 46Q58 38 66 46" stroke="#2A2A2A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
   <path d="M104 46Q112 38 120 46" stroke="#2A2A2A" stroke-width="2.5" fill="none" stroke-linecap="round"/>`,
  // 标准喙
  `<path d="M82 63 Q85 72 88 63 Q85 60 82 63Z" fill="#F49000"/>`,
  // 爱心
  `<path d="M38 22 Q38 16 42 16 Q46 16 46 22 Q46 28 42 33 Q38 28 38 22Z" fill="#FF4B4B" opacity="0.8"/>
   <path d="M132 22 Q132 16 136 16 Q140 16 140 22 Q140 28 136 33 Q132 28 132 22Z" fill="#FF4B4B" opacity="0.8"/>
   <ellipse cx="44" cy="62" rx="7" ry="4" fill="#FF6B6B" opacity="0.4"/>
   <ellipse cx="126" cy="62" rx="7" ry="4" fill="#FF6B6B" opacity="0.4"/>`
);

// 3. 生气冒烟 (Angry) - 严重型结果
DUO.angry = duoSVG(
  // 翅膀紧贴
  `<path d="M8 55Q3 45 6 38Q9 30 15 48Z" fill="#58CC02"/>
   <path d="M162 55Q167 45 164 38Q161 30 155 48Z" fill="#58CC02"/>`,
  // 怒视 - 眯眼侧看
  `<ellipse cx="56" cy="48" rx="9" ry="6" fill="white" stroke="#E0E0E0" stroke-width="0.3"/>
   <ellipse cx="114" cy="48" rx="9" ry="6" fill="white" stroke="#E0E0E0" stroke-width="0.3"/>
   <ellipse cx="57" cy="49" rx="5" ry="4" fill="#2A2A2A"/>
   <ellipse cx="113" cy="49" rx="5" ry="4" fill="#2A2A2A"/>
   <line x1="48" y1="38" x2="66" y2="40" stroke="#2A2A2A" stroke-width="2.5" stroke-linecap="round"/>
   <line x1="104" y1="38" x2="122" y2="40" stroke="#2A2A2A" stroke-width="2.5" stroke-linecap="round"/>`,
  `<path d="M82 63 Q85 70 88 63 Q85 61 82 63Z" fill="#F49000"/>
   <line x1="78" y1="76" x2="92" y2="76" stroke="#89E219" stroke-width="2" stroke-linecap="round"/>`,
  // 冒烟
  `<circle cx="50" cy="8" r="4" fill="#CCC" opacity="0.5"/>
   <circle cx="55" cy="4" r="3" fill="#CCC" opacity="0.3"/>
   <circle cx="120" cy="8" r="4" fill="#CCC" opacity="0.5"/>
   <circle cx="115" cy="4" r="3" fill="#CCC" opacity="0.3"/>`
);

// 4. 哭泣 (Cry) - 差结果
DUO.cry = duoSVG(
  // 翅膀抱胸
  `<path d="M15 50Q8 42 10 35Q12 28 18 44Z" fill="#58CC02"/>
   <path d="M155 50Q162 42 160 35Q158 28 152 44Z" fill="#58CC02"/>`,
  // 泪眼
  `<ellipse cx="58" cy="50" rx="11" ry="12" fill="white" stroke="#E0E0E0" stroke-width="0.3"/>
   <ellipse cx="112" cy="50" rx="11" ry="12" fill="white" stroke="#E0E0E0" stroke-width="0.3"/>
   <ellipse cx="60" cy="51" rx="7" ry="8.5" fill="#2A2A2A"/>
   <ellipse cx="110" cy="51" rx="7" ry="8.5" fill="#2A2A2A"/>
   <line x1="46" y1="62" x2="42" y2="78" stroke="#5BC0F0" stroke-width="2.5" stroke-linecap="round"/>
   <circle cx="42" cy="80" r="2.5" fill="#5BC0F0"/>
   <line x1="124" y1="62" x2="128" y2="78" stroke="#5BC0F0" stroke-width="2.5" stroke-linecap="round"/>
   <circle cx="128" cy="80" r="2.5" fill="#5BC0F0"/>`,
  `<path d="M82 63 Q85 70 88 63 Q85 61 82 63Z" fill="#F49000"/>
   <path d="M76 76 Q85 72 94 76" stroke="#89E219" stroke-width="2" fill="none" stroke-linecap="round"/>`,
  ``
);

// 5. 唱歌眨眼 (Sing) - 调皮结果
DUO.sing = duoSVG(
  // 单翅举
  `<path d="M5 60Q-8 45-5 35Q-2 25 8 50Z" fill="#58CC02"/>
   <path d="M165 60Q172 50 170 40Q168 30 160 50Z" fill="#58CC02"/>`,
  // 眨眼 + 吐舌
  `<ellipse cx="58" cy="50" rx="10" ry="11" fill="white" stroke="#E0E0E0" stroke-width="0.3"/>

  g('duoSpeech').innerHTML='<strong>多儿已抵达现场。</strong> '+DUO_SPEECHES[0];
  setDuo('duoMiniImg', 'serious');
  renderProgress(); renderQuestion();
}

function renderProgress(){
  const bar=g('progressBar'); bar.innerHTML='';
  for(let i=0;i<QUESTIONS.length;i++){
    const d=document.createElement('div');
    d.className='progress-dot'+(i===currentQ?' active':'')+(i<currentQ?' done':'');
    bar.appendChild(d);
  }
}

function renderQuestion(){
  const q=QUESTIONS[currentQ]; selectedOption=null;
  const moods = ['serious','confused','serious','confused','silly','confused','serious','silly','sing'];
  setDuo('duoMiniImg', moods[currentQ] || 'confused');
  g('btnNext').classList.remove('active');
  g('btnNext').textContent=currentQ<QUESTIONS.length-1?'继续':'看结果 🎯';
  g('questionArea').innerHTML=`
    <div class="question-card slide-in">
      <div class="q-icon">${q.icon}</div>
      <div class="question-num">问题 ${currentQ+1} / ${QUESTIONS.length}</div>
      <div class="question-text">${q.text}</div>
      <div class="options">
        ${q.options.map((o,i)=>`
          <button class="option-btn" data-score="${o.score}" onclick="selectOption(this,${o.score})">
            <span class="opt-icon">${o.icon}</span>
            <span>${o.text}</span>
            <span class="opt-tag ${o.tagClass}">${o.tag}</span>
          </button>
        `).join('')}
      </div>
    </div>`;
}

function selectOption(el,score){
  document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected'); selectedOption=score;
  g('btnNext').classList.add('active');
}

function nextQuestion(){
  if(selectedOption===null) return;
  answers.push(selectedOption);
  if(currentQ<QUESTIONS.length-1){
    currentQ++;
    g('duoSpeech').innerHTML='<strong>多儿已抵达现场。</strong> '+DUO_SPEECHES[currentQ];
    renderProgress(); renderQuestion();
    window.scrollTo({top:0,behavior:'smooth'});
  } else showResult();
}

function showResult(){
  const total=answers.reduce((a,b)=>a+b,0);
  let result=RESULTS[0];
  for(const r of RESULTS){if(total>=r.min&&total<=r.max){result=r;break;}}

  g('screen-quiz').style.display='none'; g('screen-result').style.display='block';
  window.scrollTo({top:0});

  setDuo('resultDuoImg', result.duoExpr || 'happy');

  g('resultBadge').textContent=result.type;
  g('resultBadge').style.background=result.badgeColor;
  g('resultTitle').textContent=result.title;
  g('resultSubtitle').textContent=result.subtitle;

  const stars='★'.repeat(result.stars)+'☆'.repeat(5-result.stars);
  g('resultDetail').innerHTML=`
    <div class="dr-section">
      <div class="dr-label" style="background:${result.dangerBg};color:${result.dangerColor}">🩺 诊断结果</div>
      <div class="danger-stars">危险等级：<span class="star-filled">${stars.replace(/★/g,'★').replace(/☆/g,'☆')}</span></div>
      <div class="danger-labels"><span style="background:${result.dangerBg};color:${result.dangerColor}">${result.dangerLabel}</span></div>
      <ul>${result.diagnosis.map(d=>`<li style="padding-left:24px">${d}</li>`).join('')}</ul>
    </div>
    <div class="dr-section">
      <div class="dr-label" style="background:#E8F5E9;color:#2E7D32">🦉 多儿说</div>
      <div class="duo-quote">${result.quote}</div>
    </div>
    <div class="dr-section">
      <div class="dr-label" style="background:#FFF3E0;color:#E65100">💊 处方建议</div>
      <ul>${result.plan.map(p=>`<li style="padding-left:24px">${p}</li>`).join('')}</ul>
    </div>`;

  g('shareText').textContent=result.share;
  g('shareUrl').textContent='🔗 '+QUIZ_URL;
  if(result.stars<=2) launchConfetti();
}

function goMission(){
  g('screen-result').style.display='none'; g('screen-mission').style.display='block';
}

function retake(){
  g('screen-result').style.display='none'; g('screen-mission').style.display='none';
  currentQ=0; answers=[]; selectedOption=null;
  g('screen-start').style.display='flex';
}

function copyShare(){
  const text=g('shareText').textContent+'\n'+QUIZ_URL;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>{
      const btn=document.querySelector('.btn-copy');
      btn.textContent='✅ 已复制！'; setTimeout(()=>{btn.textContent='📋 复制分享文案'},2000);
    });
  } else {
    const ta=document.createElement('textarea');
    ta.value=text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove();
    const btn=document.querySelector('.btn-copy');
    btn.textContent='✅ 已复制！'; setTimeout(()=>{btn.textContent='📋 复制分享文案'},2000);
  }
}

function launchConfetti(){
  const c=document.createElement('div'); c.className='confetti-container'; document.body.appendChild(c);
  const colors=['#58CC02','#1CB0F6','#FF9600','#FF4B4B','#FFD700','#89E219'];
  for(let i=0;i<50;i++){
    const e=document.createElement('div'); e.className='confetti';
    e.style.left=Math.random()*100+'%'; e.style.background=colors[Math.floor(Math.random()*colors.length)];
    e.style.width=(Math.random()*8+4)+'px'; e.style.height=(Math.random()*8+4)+'px';
    e.style.animationDuration=(Math.random()*2+1.5)+'s'; e.style.animationDelay=(Math.random()*1.5)+'s';
    c.appendChild(e);
  }
  setTimeout(()=>c.remove(),4000);
}
</script>
</body>
</html>
